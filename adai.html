<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Classic - Tic Tac Toe</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #0f0f0f, #1f1f1f);
      color: #00f7ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      text-shadow: 0 0 20px #00f7ff;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 10px;
      margin: 20px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: #111;
      border: 2px solid #00f7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5em;
      color: #00f7ff;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .cell:hover {
      background: #222;
      transform: scale(1.05);
    }

    .glow {
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #00f7ff; }
      to { box-shadow: 0 0 25px #00f7ff; }
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      background: #111;
      border: 2px solid #00f7ff;
      color: #00f7ff;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #00f7ff;
      color: #111;
    }

    #restartBtn {
      display: none;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Kindly set the difficulty level to hard.</h1>
  <h2>This game is nearly impossible to beat.</h2>
  <div class="controls">
    <button onclick="toggleMode()" id="modeBtn">Mode: 1P vs AI</button>
    <button onclick="toggleDifficulty()" id="difficultyBtn">Difficulty: Easy</button>
    <button onclick="toggleSound()" id="soundBtn">music: On</button>
  </div>
  <div class="board" id="board"></div>
  <button id="restartBtn" onclick="restartGame()">Restart Game</button>

  <audio id="clickSound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>
  <audio id="winSound" src="https://www.soundjay.com/button/sounds/button-4.mp3"></audio>
  <audio id="bgMusic" src="music.mp3" loop autoplay></audio>

  <script>
    const board = document.getElementById('board');
    const restartBtn = document.getElementById('restartBtn');
    const clickSound = document.getElementById('clickSound');
    const winSound = document.getElementById('winSound');
    const bgMusic = document.getElementById('bgMusic');

    let cells = [];
    let currentPlayer = 'X';
    let gameActive = true;
    let modeAI = true;
    let soundOn = true;
    let difficulty = 'easy';

    function playSound(sound) {
      if (soundOn) sound.play();
    }

    function createBoard() {
      board.innerHTML = '';
      cells = [];
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.addEventListener('click', () => handleCellClick(i));
        board.appendChild(cell);
        cells.push(cell);
      }
    }

    function handleCellClick(index) {
      if (!gameActive || cells[index].textContent !== '') return;
      makeMove(index, currentPlayer);
      playSound(clickSound);

      const winner = checkWin();
      if (winner) return endGame(winner);

      if (modeAI && currentPlayer === 'X') {
        currentPlayer = 'O';
        setTimeout(aiMove, 300);
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      }
    }

    function makeMove(index, player) {
      cells[index].textContent = player;
    }

    function aiMove() {
      let index;
      if (difficulty === 'easy') {
        const empty = cells.map((c, i) => c.textContent === '' ? i : null).filter(i => i !== null);
        index = empty[Math.floor(Math.random() * empty.length)];
      } else {
        index = findBestMove();
      }
      makeMove(index, 'O');
      playSound(clickSound);
      const winner = checkWin();
      if (winner) return endGame(winner);
      currentPlayer = 'X';
    }

    function findBestMove() {
      let bestScore = -Infinity;
      let move;
      for (let i = 0; i < 9; i++) {
        if (cells[i].textContent === '') {
          cells[i].textContent = 'O';
          let score = minimax(0, false);
          cells[i].textContent = '';
          if (score > bestScore) {
            bestScore = score;
            move = i;
          }
        }
      }
      return move;
    }

    function minimax(depth, isMax) {
      const result = checkWin();
      if (result === 'X') return -1;
      if (result === 'O') return 1;
      if (cells.every(cell => cell.textContent !== '')) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (cells[i].textContent === '') {
            cells[i].textContent = 'O';
            best = Math.max(best, minimax(depth + 1, false));
            cells[i].textContent = '';
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (cells[i].textContent === '') {
            cells[i].textContent = 'X';
            best = Math.min(best, minimax(depth + 1, true));
            cells[i].textContent = '';
          }
        }
        return best;
      }
    }

    function checkWin() {
      const winPatterns = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];

      for (const pattern of winPatterns) {
        const [a,b,c] = pattern;
        if (cells[a].textContent && cells[a].textContent === cells[b].textContent && cells[a].textContent === cells[c].textContent) {
          cells[a].classList.add('glow');
          cells[b].classList.add('glow');
          cells[c].classList.add('glow');
          return cells[a].textContent;
        }
      }

      if (cells.every(cell => cell.textContent !== '')) return 'Draw';
      return null;
    }

    function endGame(winner) {
      gameActive = false;
      playSound(winSound);
      restartBtn.style.display = 'inline-block';
      if (winner === 'Draw') {
        alert("It's a draw!");
      } else {
        alert(`${winner} wins!`);
      }
    }

    function restartGame() {
      cells.forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('glow');
      });
      currentPlayer = 'X';
      gameActive = true;
      restartBtn.style.display = 'none';
    }

    function toggleMode() {
      modeAI = !modeAI;
      document.getElementById('modeBtn').textContent = modeAI ? 'Mode: 1P vs AI' : 'Mode: 2P Local';
      restartGame();
    }

    function toggleDifficulty() {
      difficulty = difficulty === 'easy' ? 'hard' : 'easy';
      document.getElementById('difficultyBtn').textContent = `Difficulty: ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
      restartGame();
    }

    function toggleSound() {
      soundOn = !soundOn;
      document.getElementById('soundBtn').textContent = soundOn ? 'Sound: On' : 'Sound: Off';
      if (soundOn) bgMusic.play(); else bgMusic.pause();
    }

    createBoard();
  </script>
</body>
</html>
